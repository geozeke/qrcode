[project]
site_name = "QR Code Generator"
site_url = "https://geozeke.github.io/qrcode/"
site_description = "Documentation for the self-hosted QR Code Generator"
site_author = "Peter Nardi"
repo_url = "https://github.com/geozeke/qrcode"
repo_name = "geozeke/qrcode"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"
copyright = "Copyright &copy; 2026 Peter Nardi and contributors"
nav = [
  { "Home" = "index.md" },
  { "Getting started" = "getting-started.md" },
  { "User guide" = "user-guide.md" },
  { "Deployment" = "deployment.md" },
  { "Development" = "development.md" },
  { "Dependency licenses" = "dependency-licenses.md" },
]

[project.theme]
variant = "modern"
features = [
  "navigation.instant",
  "search.highlight",
  "content.code.copy",
  "content.action.edit",
  "content.action.view",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
