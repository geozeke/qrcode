version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    versioning-strategy: increase-if-necessary
    allow:
      - dependency-type: direct
    groups:
      python-dependencies:
        patterns: ["*"]
        update-types: [minor, patch]
    commit-message:
      prefix: build
      include: scope

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    versioning-strategy: increase-if-necessary
    allow:
      - dependency-type: direct
    groups:
      frontend-dependencies:
        patterns: ["*"]
        update-types: [minor, patch]
    commit-message:
      prefix: build
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    allow:
      - dependency-type: direct
    commit-message:
      prefix: build
      include: scope

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    allow:
      - dependency-type: direct
    commit-message:
      prefix: build
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    allow:
      - dependency-type: direct
    commit-message:
      prefix: build
      include: scope
