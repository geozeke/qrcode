name: Publish images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.29"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: extractions/setup-just@v3
      - name: Set up locked development environments
        run: just setup
      - name: Validate release metadata and notes
        run: uv run python -m scripts.validate_release "$GITHUB_REF_NAME"
      - run: just check
      - name: Install Chromium
        run: npm --prefix frontend exec -- playwright install --with-deps chromium
      - run: just test-e2e
      - name: Upload browser test diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
          retention-days: 14
      - name: Test release deployment on host Docker Engine
        env:
          QR_IMAGE: qrcode:release-candidate
          QR_IMAGE_REVISION: ${{ github.sha }}
        run: |
          export QR_IMAGE_VERSION="${GITHUB_REF_NAME#v}"
          just deployment-test
      - name: Scan release candidate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: qrcode:release-candidate
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

  publish:
    name: Publish multi-architecture image
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Validate Docker Hub configuration
        env:
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_REPOSITORY"
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_TOKEN"
          [[ "$DOCKERHUB_REPOSITORY" == */qrcode ]]
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ vars.DOCKERHUB_REPOSITORY }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.licenses=MIT
      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          annotations: ${{ steps.metadata.outputs.annotations }}
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            REVISION=${{ github.sha }}
            CREATED=${{ fromJSON(steps.metadata.outputs.json).labels['org.opencontainers.image.created'] }}
          provenance: mode=max
          sbom: true

  release:
    name: Publish GitHub release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.29"
      - name: Extract release notes
        run: uv run python -m scripts.extract_release_notes "$GITHUB_REF_NAME" .release-notes.md
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="QR Code Generator $GITHUB_REF_NAME"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "$title" \
              --notes-file .release-notes.md
          elif [[ "$GITHUB_REF_NAME" == *-* ]]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$title" \
              --notes-file .release-notes.md \
              --prerelease \
              --verify-tag
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$title" \
              --notes-file .release-notes.md \
              --verify-tag
          fi
