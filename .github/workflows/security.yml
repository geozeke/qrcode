name: Security

on:
  schedule:
    - cron: "23 7 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/security.yml"
      - "Dockerfile"
      - "compose*.yaml"
      - "config/dependency-licenses.toml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-scan:
    name: Trivy repository scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Scan repository
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Summarize repository scan
        if: always()
        env:
          RESULT: ${{ steps.trivy.outcome }}
        run: |
          {
            echo "### Trivy repository scan"
            echo
            echo "| Check | Result | Details |"
            echo "| --- | --- | --- |"
            echo "| Vulnerabilities, misconfigurations, and secrets | $RESULT | See the Scan repository step log. |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce repository scan
        if: always() && steps.trivy.outcome == 'failure'
        run: exit 1

  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
      - name: Audit Python dependencies
        id: python_audit
        continue-on-error: true
        run: uv run --locked --all-groups pip-audit
      - name: Summarize Python audit
        if: always()
        env:
          RESULT: ${{ steps.python_audit.outcome }}
        run: |
          {
            echo "### Python dependency audit"
            echo
            echo "| Check | Result | Details |"
            echo "| --- | --- | --- |"
            echo "| Full resolved dependency graph | $RESULT | See the Audit Python dependencies step log. |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce Python audit
        if: always() && steps.python_audit.outcome == 'failure'
        run: exit 1

  javascript-audit:
    name: JavaScript dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install JavaScript dependencies
        run: npm --prefix frontend ci
      - name: Audit JavaScript dependencies
        id: javascript_audit
        continue-on-error: true
        run: npm --prefix frontend audit --audit-level=high
      - name: Summarize JavaScript audit
        if: always()
        env:
          RESULT: ${{ steps.javascript_audit.outcome }}
        run: |
          {
            echo "### JavaScript dependency audit"
            echo
            echo "| Check | Result | Details |"
            echo "| --- | --- | --- |"
            echo "| Full resolved dependency graph | $RESULT | See the Audit JavaScript dependencies step log. |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce JavaScript audit
        if: always() && steps.javascript_audit.outcome == 'failure'
        run: exit 1

  license-policy:
    name: Direct dependency license policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
      - name: Check direct dependency licenses
        id: license_check
        continue-on-error: true
        run: uv run --locked python scripts/check_dependency_licenses.py
      - name: Summarize license policy
        if: always()
        env:
          RESULT: ${{ steps.license_check.outcome }}
        run: |
          {
            echo "### Direct dependency license policy"
            echo
            echo "| Check | Result | Details |"
            echo "| --- | --- | --- |"
            echo "| Approved direct dependency licenses | $RESULT | See the Check direct dependency licenses step log. |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce license policy
        if: always() && steps.license_check.outcome == 'failure'
        run: exit 1

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        id: codeql_init
        continue-on-error: true
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript,python
      - name: Analyze source
        id: codeql_analyze
        if: steps.codeql_init.outcome == 'success'
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
      - name: Summarize CodeQL analysis
        if: always()
        env:
          ANALYZE_RESULT: ${{ steps.codeql_analyze.outcome }}
          INIT_RESULT: ${{ steps.codeql_init.outcome }}
        run: |
          {
            echo "### CodeQL analysis"
            echo
            echo "| Check | Result | Details |"
            echo "| --- | --- | --- |"
            echo "| Initialization | $INIT_RESULT | See the Initialize CodeQL step log. |"
            echo "| Source analysis | $ANALYZE_RESULT | See the Analyze source step log and Code Scanning. |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce CodeQL analysis
        if: >-
          always() &&
          (steps.codeql_init.outcome == 'failure' ||
          steps.codeql_analyze.outcome == 'failure')
        run: exit 1
