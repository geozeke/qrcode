name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Application quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: extractions/setup-just@v4
      - name: Set up locked development environments
        run: just setup
      - name: Validate pull request title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: uv run python -m scripts.check_commit_title "$PR_TITLE"
      - name: Run local-equivalent checks
        run: just check
      - name: Build frontend production assets
        run: npm --prefix frontend run build

  browser:
    name: Browser tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm --prefix frontend ci
      - name: Install Chromium
        run: npm --prefix frontend exec -- playwright install --with-deps chromium
      - run: npm --prefix frontend run test:e2e
      - name: Upload browser test diagnostics
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
          retention-days: 14

  container:
    name: Production container
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v4
      - name: Test production deployment on host Docker Engine
        env:
          QR_IMAGE: qrcode:ci
          QR_IMAGE_VERSION: ci
          QR_IMAGE_REVISION: ${{ github.sha }}
        run: just deployment-test
      - name: Scan production image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: qrcode:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
