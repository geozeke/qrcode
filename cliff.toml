[changelog]
header = """
# Changelog

All notable changes to QR Code Generator are documented here. The
format is based on
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/), and this
project uses
[Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% if previous.version %}
[Compare with {{ previous.version | trim_start_matches(pat="v") }}](https://github.com/geozeke/qrcode/compare/{{ previous.version }}...{{ version }})
{% else %}
[View release tag](https://github.com/geozeke/qrcode/releases/tag/{{ version }})
{% endif %}
{% else %}\
## [Unreleased]
{% endif %}\
{% set breaking = commits | filter(attribute="breaking", value=true) %}\
{% if breaking | length != 0 %}
### Breaking Changes
{% for commit in breaking %}
- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/geozeke/qrcode/commit/{{ commit.id }}))
{% if commit.breaking_description and commit.breaking_description != commit.message %}
  **Migration:** {{ commit.breaking_description }}
{% endif %}
{% endfor %}
{% endif %}\
{% set regular = commits | filter(attribute="breaking", value=false) %}\
{% for group, commits in regular | group_by(attribute="group") %}
{% if group != "<!-- 99 -->Internal" %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/geozeke/qrcode/commit/{{ commit.id }}))
{% endfor %}
{% endif %}
{% endfor %}
"""
trim = true
render_always = true
postprocessors = [
  { pattern = '''\n{3,}''', replace = "\n\n" },
]

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = false
split_commits = false
protect_breaking_commits = true
commit_parsers = [
  { message = "^chore\\(release\\)", group = "<!-- 99 -->Internal" },
  { message = "^(fix|security)\\(security\\)|^security", group = "<!-- 01 -->Security" },
  { message = "^security", group = "<!-- 01 -->Security" },
  { message = "^feat", group = "<!-- 02 -->Added" },
  { message = "^change", group = "<!-- 03 -->Changed" },
  { message = "^deprecate", group = "<!-- 04 -->Deprecated" },
  { message = "^remove", group = "<!-- 05 -->Removed" },
  { message = "^fix", group = "<!-- 06 -->Fixed" },
  { message = "^perf", group = "<!-- 07 -->Performance" },
  { message = "^deploy", group = "<!-- 08 -->Deployment & Operations" },
  { message = "^docs", group = "<!-- 09 -->Documentation" },
  { message = "^(build|chore)\\(deps", group = "<!-- 10 -->Dependencies" },
  { message = "^revert", group = "<!-- 11 -->Reverted" },
  { message = "^(build|chore|ci|refactor|style|test)", group = "<!-- 99 -->Internal" },
  { message = ".*", group = "<!-- 99 -->Internal" },
]
filter_commits = true
fail_on_unmatched_commit = false
tag_pattern = "v?[0-9]+\\.[0-9]+\\.[0-9]+(?:-[0-9A-Za-z.-]+)?"
ignore_tags = "latest"
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
