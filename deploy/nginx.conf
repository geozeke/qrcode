worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log off;
    error_log /dev/stderr warn;
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;

    limit_req_zone $binary_remote_addr zone=preview:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=download:10m rate=30r/m;
    limit_req_status 429;

    upstream qrcode_backend {
        server qrcode:8080;
        keepalive 8;
    }

    server {
        listen 8080;
        server_name _;
        client_max_body_size 5m;

        location = /api/preview {
            limit_req zone=preview burst=20 nodelay;
            proxy_pass http://qrcode_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location = /api/download {
            limit_req zone=download burst=5 nodelay;
            proxy_pass http://qrcode_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://qrcode_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }
    }
}
